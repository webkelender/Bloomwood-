<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VELORIA Admin Panel</title>
<style>
body{font-family:Arial,sans-serif;max-width:1200px;margin:auto;padding:20px}
.card{border:1px solid #ddd;padding:16px;border-radius:12px;margin:12px 0}
input,select,button{padding:10px;margin:6px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px}
</style>
</head>
<body>
<script>
const pass=prompt("Admin Password");
if(pass!=="VELORIA2026"){
 document.body.innerHTML="<h1>Access Denied</h1>";
 throw new Error("Unauthorized");
}
</script>

<h1>VELORIA Admin Panel (Demo)</h1>

<div class="card">
<h2>Add Product</h2>
<input placeholder="Product Name">
<input placeholder="Price">
<select>
<option>New Arrival</option>
<option>Best Seller</option>
<option>Featured</option>
</select>
<button>Add Product</button>
</div>

<div class="card">
<h2>Manage Products</h2>
<table>
<tr><th>Product</th><th>Price</th><th>Category</th><th>Action</th></tr>
<tr><td>Sample Product</td><td>₹999</td><td>Best Seller</td><td>Edit | Delete</td></tr>
</table>
</div>

<div class="card">
<h2>Store Settings</h2>
<input placeholder="Phone Number">
<input placeholder="WhatsApp Number">
<input placeholder="Store Address">
<button>Save</button>
</div>
</body>
</html>
