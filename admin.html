<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel — Bloomwood</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/admin.css">
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <span class="brand">Bloomwood <span>admin</span></span>
    <button class="sidebar-close" onclick="document.getElementById('sidebar').classList.remove('open')">✕</button>
  </div>
  <nav class="navlist" id="navlist"></nav>
  <div class="sidebar-user">
    <p>Signed in as</p>
    <p id="roleLabel">Store Admin</p>
  </div>
  <div style="margin:8px 16px;">
    <a href="index.html" style="font-size:12px;color:#B9C2AE;">← Back to storefront</a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="flex center gap16">
      <button class="hamburger-admin" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <h1 id="pageTitle">Dashboard</h1>
    </div>
    <div class="flex center gap16">
      <div class="search-mini"><span>⌕</span><input placeholder="Search admin"/></div>
      <span title="3 notifications">🔔</span>
      <select class="role-select" id="roleSelect"><option>Admin</option><option>Manager</option></select>
      <div class="avatar">SA</div>
    </div>
  </header>
  <main class="content" id="content"></main>
</div>
<div id="modalHost"></div>

<script>
/* ---------------- data & persistence ---------------- */
const ADMIN_KEY = "bloomwood_admin_v1";
const CATS = ["Cosmetics","Skincare","Haircare","Beauty Products"];
function defaults(){
  return {
    role: "Admin",
    products: [
      { id:1, name:"Bloomwater Cream Cleanser", cat:"Skincare", price:28, stock:142, status:"Active", sku:"BW-CLN-001" },
      { id:2, name:"Verdant Clay Purifying Mask", cat:"Skincare", price:34, stock:8, status:"Active", sku:"BW-MSK-002" },
      { id:3, name:"Golden Hour Vitamin C Serum", cat:"Skincare", price:46, stock:63, status:"Active", sku:"BW-SER-003" },
      { id:4, name:"Petal Silk Blush Duo", cat:"Cosmetics", price:24, stock:51, status:"Active", sku:"BW-BLS-004" },
      { id:5, name:"Understated Tinted Balm", cat:"Cosmetics", price:22, stock:6, status:"Active", sku:"BW-LIP-005" },
      { id:6, name:"Botanical Root Repair Oil", cat:"Haircare", price:38, stock:88, status:"Active", sku:"BW-OIL-006" },
      { id:7, name:"Fig Milk Body Polish", cat:"Beauty Products", price:30, stock:0, status:"Out of Stock", sku:"BW-BDY-007" },
    ],
    orders: [
      { id:"BW4821", customer:"Meera Nair", items:3, total:108, status:"Delivered", date:"2026-07-12", payment:"Paid" },
      { id:"BW4822", customer:"Priya Shah", items:1, total:28, status:"Shipped", date:"2026-07-13", payment:"Paid" },
      { id:"BW4823", customer:"Aisha Khan", items:2, total:70, status:"Processing", date:"2026-07-14", payment:"Paid" },
      { id:"BW4824", customer:"Ritu Desai", items:4, total:156, status:"Processing", date:"2026-07-15", payment:"Pending" },
    ],
    coupons: [
      { id:1, code:"BLOOM10", type:"Percentage", value:"10%", uses:214, status:"Active", expires:"2026-08-31" },
      { id:2, code:"WELCOME15", type:"Percentage", value:"15%", uses:502, status:"Active", expires:"2026-12-31" },
    ],
  };
}
function load(){ try{ const raw = localStorage.getItem(ADMIN_KEY); return raw ? JSON.parse(raw) : defaults(); }catch(e){ return defaults(); } }
function save(s){ try{ localStorage.setItem(ADMIN_KEY, JSON.stringify(s)); }catch(e){} }
function get(k){ return load()[k]; }
function set(k,v){ const s = load(); s[k]=v; save(s); }

const statusTone = { Active:"good","In Stock":"good",Delivered:"good",Paid:"good",Processing:"warn",Pending:"warn",
  "Out of Stock":"bad",Cancelled:"bad",Refunded:"bad",Expired:"bad",Shipped:"info" };
function badge(text,tone){ return `<span class="badge badge-${tone||'neutral'}">${text}</span>`; }
function miniBarChart(data){
  const max = Math.max(...data);
  return `<div class="chart">${data.map((v,i)=>`<div class="${i===data.length-1?'last':''}" style="height:${(v/max)*100}%"></div>`).join("")}</div>`;
}
const salesTrend = [32,41,38,52,49,61,58,70,66,78,74,88];

/* ---------------- nav & layout ---------------- */
const NAV = [
  { key:"dashboard", label:"Dashboard", icon:"▦", roles:["Admin","Manager"] },
  { key:"products", label:"Products & Inventory", icon:"◆", roles:["Admin","Manager"] },
  { key:"orders", label:"Orders & Customers", icon:"▥", roles:["Admin","Manager"] },
  { key:"coupons", label:"Coupons & Discounts", icon:"%", roles:["Admin","Manager"] },
  { key:"settings", label:"Store Settings", icon:"⚙", roles:["Admin"] },
];
let view = "dashboard";

function renderSidebar(){
  const role = get("role") || "Admin";
  document.getElementById("navlist").innerHTML = NAV.filter(n=>n.roles.includes(role)).map(n=>`
    <button class="navitem ${view===n.key?'active':''}" onclick="goto('${n.key}')"><span>${n.icon}</span>${n.label}</button>
  `).join("");
  document.getElementById("roleLabel").textContent = role==="Admin" ? "Store Admin" : "Store Manager";
  document.getElementById("roleSelect").value = role;
}
function goto(key){
  const role = get("role") || "Admin";
  const item = NAV.find(n=>n.key===key);
  if(item && !item.roles.includes(role)){ key = "dashboard"; }
  view = key;
  document.getElementById("pageTitle").textContent = NAV.find(n=>n.key===view)?.label || "Dashboard";
  document.getElementById("sidebar").classList.remove("open");
  renderSidebar();
  renderContent();
}
window.goto = goto;
document.getElementById("roleSelect").addEventListener("change", e=>{ set("role", e.target.value); goto("dashboard"); });

/* ---------------- sections ---------------- */
function renderContent(){
  const host = document.getElementById("content");
  if(view==="dashboard") host.innerHTML = dashboardHTML();
  else if(view==="products") host.innerHTML = productsHTML();
  else if(view==="orders") host.innerHTML = ordersHTML();
  else if(view==="coupons") host.innerHTML = couponsHTML();
  else if(view==="settings") host.innerHTML = settingsHTML();
}

function dashboardHTML(){
  const products = get("products"), orders = get("orders");
  const lowStock = products.filter(p=>p.stock>0 && p.stock<=10);
  const outStock = products.filter(p=>p.stock===0);
  const revenue = orders.reduce((s,o)=>s+o.total,0);
  return `
    <div class="grid sm-grid-2 md-grid-4">
      <div class="kpi"><p>Revenue (30d)</p><p class="value">$${revenue.toLocaleString()}</p><p class="delta" style="color:var(--sage);">▲ 12.4%</p></div>
      <div class="kpi"><p>Orders</p><p class="value">${orders.length}</p><p class="delta" style="color:var(--sage);">▲ 6.1%</p></div>
      <div class="kpi"><p>Products Listed</p><p class="value">${products.length}</p><p class="delta muted">Across ${CATS.length} categories</p></div>
      <div class="kpi"><p>Avg. Order Value</p><p class="value">$${(revenue/orders.length).toFixed(0)}</p><p class="delta" style="color:#8A3B32;">▼ 1.8%</p></div>
    </div>
    <div class="grid lg-grid-3" style="margin-top:20px;">
      <div class="panel" style="grid-column:span 2;"><h3>Sales, last 12 weeks</h3>${miniBarChart(salesTrend)}</div>
      <div class="panel"><h3>⚠ Stock Alerts</h3>
        ${[...outStock,...lowStock].slice(0,5).map(p=>`<div class="flex between" style="font-size:13px;padding:6px 0;"><span>${p.name}</span>${badge(p.stock===0?"Out":p.stock+" left",p.stock===0?"bad":"warn")}</div>`).join("") || `<p class="muted" style="font-size:13px;">All stock healthy.</p>`}
      </div>
    </div>
    <div class="panel" style="margin-top:20px;">
      <h3>Recent Orders</h3>
      <div class="table-wrap" style="border:none;"><table>
        <thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${orders.slice(0,5).map(o=>`<tr><td>#${o.id}</td><td>${o.customer}</td><td>$${o.total}</td><td>${badge(o.status,statusTone[o.status])}</td><td>${o.date}</td></tr>`).join("")}</tbody>
      </table></div>
    </div>`;
}

function productsHTML(){
  const products = get("products");
  return `
    <div class="flex between center" style="margin-bottom:20px;">
      <p class="muted" style="font-size:13px;">${products.length} products</p>
      <button class="btn btn-dark" onclick="openProductModal()">+ Add Product</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Product</th><th>SKU</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th></th></tr></thead>
      <tbody>${products.map(p=>`
        <tr>
          <td>${p.name}</td><td>${p.sku}</td><td>${p.cat}</td><td>$${p.price}</td>
          <td class="flex gap8" style="align-items:center;">
            <button class="stock-btn" onclick="adjustStock(${p.id},-1)">–</button>${p.stock}<button class="stock-btn" onclick="adjustStock(${p.id},1)">+</button>
          </td>
          <td>${badge(p.status,statusTone[p.status]||"neutral")}</td>
          <td class="flex gap12"><button onclick="removeProduct(${p.id})" style="color:#8A3B32;" title="Delete">🗑</button></td>
        </tr>`).join("")}</tbody>
    </table></div>`;
}
function adjustStock(id,delta){
  const products = get("products").map(p=>{
    if(p.id!==id) return p;
    const stock = Math.max(0,p.stock+delta);
    return {...p, stock, status: stock===0?"Out of Stock":"Active"};
  });
  set("products", products); renderContent();
}
function removeProduct(id){ set("products", get("products").filter(p=>p.id!==id)); renderContent(); }
function openProductModal(){
  document.getElementById("modalHost").innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="modal-box">
        <div class="flex between center" style="margin-bottom:16px;"><h3 class="serif" style="font-size:19px;">Add Product</h3><button onclick="closeModal()">✕</button></div>
        <form id="pf">
          <label class="field-label">Product name</label><input class="field" id="pf_name" required/>
          <label class="field-label">SKU</label><input class="field" id="pf_sku" required/>
          <label class="field-label">Category</label>
          <select class="field" id="pf_cat">${CATS.map(c=>`<option>${c}</option>`).join("")}</select>
          <div class="grid sm-grid-2">
            <div><label class="field-label">Price ($)</label><input class="field" id="pf_price" type="number" required/></div>
            <div><label class="field-label">Stock qty</label><input class="field" id="pf_stock" type="number" required/></div>
          </div>
          <div class="flex gap12"><button type="submit" class="btn btn-dark">Save Product</button><button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
        </form>
      </div>
    </div>`;
  document.getElementById("pf").addEventListener("submit", function(e){
    e.preventDefault();
    const stock = Number(document.getElementById("pf_stock").value);
    const product = { id: Date.now(), name: document.getElementById("pf_name").value, sku: document.getElementById("pf_sku").value,
      cat: document.getElementById("pf_cat").value, price: Number(document.getElementById("pf_price").value), stock,
      status: stock===0 ? "Out of Stock" : "Active" };
    set("products", [...get("products"), product]);
    closeModal(); renderContent();
  });
}
function closeModal(){ document.getElementById("modalHost").innerHTML = ""; }

function ordersHTML(){
  const orders = get("orders");
  return `
    <div class="table-wrap"><table>
      <thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
      <tbody>${orders.map(o=>`
        <tr>
          <td>#${o.id}</td><td>${o.customer}</td><td>${o.items}</td><td>$${o.total}</td>
          <td>${badge(o.payment,statusTone[o.payment])}</td>
          <td><select onchange="updateOrderStatus('${o.id}',this.value)" style="font-size:12px;padding:4px 8px;background:var(--tile);border-radius:6px;">
            ${["Processing","Shipped","Delivered","Cancelled"].map(s=>`<option ${o.status===s?'selected':''}>${s}</option>`).join("")}
          </select></td>
          <td>${o.date}</td>
        </tr>`).join("")}</tbody>
    </table></div>`;
}
function updateOrderStatus(id,status){ set("orders", get("orders").map(o=>o.id===id?{...o,status}:o)); renderContent(); }

function couponsHTML(){
  const coupons = get("coupons");
  return `
    <div class="flex" style="justify-content:flex-end;margin-bottom:20px;"><button class="btn btn-dark" onclick="openCouponModal()">+ New Coupon</button></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Code</th><th>Type</th><th>Value</th><th>Uses</th><th>Expires</th><th>Status</th><th></th></tr></thead>
      <tbody>${coupons.map(c=>`
        <tr><td>${c.code}</td><td>${c.type}</td><td>${c.value}</td><td>${c.uses}</td><td>${c.expires}</td>
        <td>${badge(c.status,statusTone[c.status])}</td>
        <td><button onclick="toggleCoupon(${c.id})" style="font-size:11px;text-decoration:underline;">${c.status==='Active'?'Expire':'Reactivate'}</button></td></tr>`).join("")}</tbody>
    </table></div>`;
}
function openCouponModal(){
  document.getElementById("modalHost").innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="modal-box">
        <div class="flex between center" style="margin-bottom:16px;"><h3 class="serif" style="font-size:19px;">New Coupon</h3><button onclick="closeModal()">✕</button></div>
        <form id="cf">
          <label class="field-label">Coupon code</label><input class="field" id="cf_code" required style="text-transform:uppercase;"/>
          <label class="field-label">Discount type</label>
          <select class="field" id="cf_type"><option>Percentage</option><option>Fixed</option><option>Free Shipping</option></select>
          <label class="field-label">Value</label><input class="field" id="cf_value" placeholder="e.g. 10% or $5" required/>
          <label class="field-label">Expiry date</label><input class="field" id="cf_expires" type="date" required/>
          <div class="flex gap12"><button type="submit" class="btn btn-dark">Create Coupon</button><button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
        </form>
      </div>
    </div>`;
  document.getElementById("cf").addEventListener("submit", function(e){
    e.preventDefault();
    const coupon = { id: Date.now(), code: document.getElementById("cf_code").value.toUpperCase(), type: document.getElementById("cf_type").value,
      value: document.getElementById("cf_value").value, expires: document.getElementById("cf_expires").value, uses:0, status:"Active" };
    set("coupons", [...get("coupons"), coupon]);
    closeModal(); renderContent();
  });
}
function toggleCoupon(id){ set("coupons", get("coupons").map(c=>c.id===id?{...c,status:c.status==='Active'?'Expired':'Active'}:c)); renderContent(); }

function settingsHTML(){
  const rows = [["Cash on Delivery",true],["Card Payments",true],["UPI / Wallets",true],["Free shipping over $50",true],["Email order notifications",true],["SMS order notifications",false]];
  return `
    <div class="panel" style="max-width:480px;">
      <h3>🛡 Payment, Shipping & Notifications</h3>
      <p class="muted" style="font-size:12.5px;margin:-8px 0 16px;">Admin-only settings — changes apply store-wide.</p>
      <div style="display:flex;flex-direction:column;gap:16px;">
        ${rows.map(([label,def],i)=>`<div class="flex between center"><span style="font-size:13.5px;">${label}</span><button class="toggle ${def?'on':''}" onclick="this.classList.toggle('on')"><span></span></button></div>`).join("")}
      </div>
    </div>`;
}

window.adjustStock=adjustStock; window.removeProduct=removeProduct; window.openProductModal=openProductModal; window.closeModal=closeModal;
window.updateOrderStatus=updateOrderStatus; window.openCouponModal=openCouponModal; window.toggleCoupon=toggleCoupon;

/* ---------------- init ---------------- */
renderSidebar();
goto("dashboard");
</script>
</body>
</html>
